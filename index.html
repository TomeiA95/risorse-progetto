<!DOCTYPE html>
<html lang="it">
<head>

  <title>Risorse Progetto</title>
  <style>
    body {

      font-family: Arial, sans-serif;
      background: linear-gradient(#dff6ff, #ffffff);

      color: #1b3a4b;
    }

    header {
      padding: 40px 20px 10px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      max-width: 600px;
      margin: 0 auto 20px;
    }

    .sirenetta {
      font-size: 60px;
      margin: 10px 0;
    }

    .box {
      margin-top: 30px;
    }

    a.button {
      display: inline-block;
      margin: 15px;
      padding: 15px 25px;
      background-color: #7ec8e3;
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-size: 18px;
      transition: 0.3s;
    }

    a.button:hover {
      background-color: #4aa3c7;
    }

    footer {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

</html>
